<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Audio Search app icon: a magnifier lens framing an amber audio waveform on a dark
       rounded square. Search + audio in one mark, matching the app's amber-on-dark UI. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a12"/>
      <stop offset="1" stop-color="#0c0a08"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.42" cy="0.40" r="0.6">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.40"/>
      <stop offset="0.6" stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <clipPath id="lensClip"><circle cx="440" cy="440" r="226"/></clipPath>
  </defs>

  <!-- rounded-square background + soft amber glow -->
  <rect x="80" y="80" width="864" height="864" rx="208" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="208" fill="url(#glow)"/>

  <!-- magnifier handle (drawn under the lens) -->
  <line x1="600" y1="600" x2="816" y2="816" stroke="#5c3804" stroke-width="104" stroke-linecap="round"/>
  <line x1="600" y1="600" x2="816" y2="816" stroke="url(#ring)" stroke-width="74" stroke-linecap="round"/>

  <!-- lens interior -->
  <circle cx="440" cy="440" r="226" fill="#0f0c0a"/>

  <!-- waveform bars, clipped to the lens -->
  <g clip-path="url(#lensClip)" fill="url(#bar)">
    <rect x="278" y="370" width="34" height="140" rx="17"/>
    <rect x="336" y="315" width="34" height="250" rx="17"/>
    <rect x="394" y="275" width="34" height="330" rx="17"/>
    <rect x="452" y="290" width="34" height="300" rx="17"/>
    <rect x="510" y="335" width="34" height="210" rx="17"/>
    <rect x="568" y="365" width="34" height="150" rx="17"/>
  </g>

  <!-- lens ring on top -->
  <circle cx="440" cy="440" r="226" fill="none" stroke="url(#ring)" stroke-width="40"/>
</svg>
